version: "3.9"

services:
  postgres-parking:
    build:
      context: ./backend/parking-management-service/postgres
      dockerfile: Dockerfile
    container_name: postgres-parking
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  parking-management-service:
    build:
      context: ./backend/parking-management-service
      dockerfile: Dockerfile
    container_name: parking-management-service
    depends_on:
      postgres-parking:
        condition: service_healthy
    env_file:
      - ./backend/parking-management-service/.env
    environment:
      DB_HOST: postgres-parking
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend/parking-management-service:/app

  frontend:
    build:
      context: ./frontend/src
      dockerfile: Dockerfile
    container_name: parking-frontend
    depends_on:
      - parking-management-service
    environment:
      - VITE_API_BASE_URL=http://parking-management-service:8000
    ports:
      - "3000:80"
    networks:
      - default

volumes:
  pgdata: