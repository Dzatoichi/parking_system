services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-parking:
    build:
      context: ./backend/parking-management-service/postgres
      dockerfile: Dockerfile
    container_name: postgres-parking
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_pass
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  parking-management-service:
    build:
      context: ./backend/parking-management-service
      dockerfile: Dockerfile
    container_name: parking-management-service
    depends_on:
      postgres-parking:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./backend/parking-management-service/.env
    environment:
      DB_HOST: postgres-parking
      DB_PORT: 5432
      AUTH_SERVICE_URL: http://auth-service:8003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - ./backend/parking-management-service:/app

  auth-service:
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
    env_file:
      - ./backend/auth_service/.env
    environment:
      DB_HOST: postgres-auth
      DB_PORT: 5432
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    volumes:
      - ./backend/auth_service:/app

  cv-processing-service:
    build:
      context: ./backend/cv-processing-service
      dockerfile: Dockerfile
    container_name: cv-processing-service
    env_file:
      - ./backend/cv-processing-service/.env
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      PARKING_MANAGEMENT_URL: http://parking-management-service:8000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      parking-management-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    volumes:
      - ./backend/cv-processing-service:/app

  stream-ingest-service:
    build:
      context: ./backend/stream-ingest-service
      dockerfile: Dockerfile
    container_name: stream-ingest-service
    depends_on:
      cv-processing-service:
        condition: service_healthy
    env_file:
      - ./backend/stream-ingest-service/.env
    environment:
      CV_SERVICE_URL: http://cv-processing-service:8001
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    volumes:
      - ./backend/stream-ingest-service:/app

  device-emulator-service:
    build:
      context: ./backend/device-emulator-service
      dockerfile: Dockerfile
    container_name: device-emulator-service
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      SQLITE_PATH: sqlite+aiosqlite:////app/data/emulator.db
      PARKING_MANAGEMENT_SERVICE_URL: http://parking-management-service:8000
      PARKING_MANAGEMENT_TIMEOUT_SECONDS: 5
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./backend/device-emulator-service/data:/app/data
      - ./backend/device-emulator-service/src:/app/src

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      SQLITE_PATH: sqlite+aiosqlite:////app/data/payments.db
      MOCK_PAYMENT_BASE_URL: http://localhost:8005/mock-payments
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./backend/payment-service/data:/app/data
      - ./backend/payment-service/src:/app/src

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      WATCHFILES_FORCE_POLLING: "true"
      SQLITE_PATH: sqlite+aiosqlite:////app/data/notifications.db
      PUSH_PROVIDER: ${PUSH_PROVIDER:-fcm}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_FILE: /app/secrets/firebase-service-account.json
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - ./backend/notification-service/data:/app/data
      - ./backend/notification-service/src:/app/src
      - ./backend/notification-service/secrets:/app/secrets:ro

  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    depends_on:
      parking-management-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ./frontend/src
      dockerfile: Dockerfile
    container_name: parking-frontend
    depends_on:
      parking-management-service:
        condition: service_healthy
      device-emulator-service:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://parking-management-service:8000
      VITE_EMULATOR_PROXY_TARGET: http://device-emulator-service:8004
      VITE_AUTH_API_URL: http://localhost:8003
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app
      - frontend-node-modules:/app/node_modules

volumes:
  auth-pgdata:
  pgdata:
  frontend-node-modules:
